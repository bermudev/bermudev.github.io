<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" role="img" aria-labelledby="title desc">
  <title id="title">bermudev logotype</title>
  <desc id="desc">Minimal SVG logotype reading bermudev</desc>

  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#29bc89"/>
      <stop offset="100%" stop-color="#006cac"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="transparent"/>

  <text
    x="50%"
    y="52%"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
    font-size="112"
    font-weight="800"
    letter-spacing="-3"
    fill="#1f2937">bermu<tspan fill="url(#accent)">dev</tspan></text>

  <rect x="218" y="164" width="464" height="10" rx="5" fill="url(#accent)" opacity="0.95"/>
</svg>